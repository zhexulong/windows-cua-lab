name: windows-cua-lab CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-broker-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: npm ci
      - run: npm test
